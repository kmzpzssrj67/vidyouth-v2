# Local-dev compose. Brings up Postgres + Redis + the API on one network so a
# fresh clone can run `docker compose up` and hit http://localhost:8080/healthz.
#
# JWT_PRIVATE_KEY and JWT_PUBLIC_KEY are pulled from the host shell (see
# scripts/run-local.ps1 — it loads PEMs from ./secrets and exports them
# before invoking compose).
services:
  postgres:
    image: postgres:16-alpine
    container_name: vidyouth-postgres
    environment:
      POSTGRES_DB: vidyouth_lms
      POSTGRES_USER: vidyouth
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidyouth -d vidyouth_lms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vidyouth-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: vidyouth-api
    environment:
      NODE_ENV: development
      PORT: 8080
      LOG_LEVEL: debug
      DATABASE_URL: postgres://vidyouth:devpass@postgres:5432/vidyouth_lms
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: "vidyouth:dev:"
      BCRYPT_PEPPER: dev-pepper-replace-in-prod-32chars
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ISSUER: vidyouth.auth
      JWT_AUDIENCE: vidyouth.lms
      JWT_ACCESS_TTL_SECONDS: "900"
      JWT_REFRESH_TTL_SECONDS: "2592000"
      SMS_PROVIDER: ${SMS_PROVIDER:-sns}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-ses}
      EMAIL_FROM: ${EMAIL_FROM:-vidyouth2@gmail.com}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_SMS_REGION: ${AWS_SMS_REGION:-}
      AWS_EMAIL_REGION: ${AWS_EMAIL_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-vidyouth2@gmail.com}
      SNS_SMS_TYPE: ${SNS_SMS_TYPE:-Transactional}
      SNS_SENDER_ID: ${SNS_SENDER_ID:-}
      SNS_ENTITY_ID: ${SNS_ENTITY_ID:-}
      SNS_TEMPLATE_ID: ${SNS_TEMPLATE_ID:-}
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY:-}
      MSG91_TEMPLATE_ID: ${MSG91_TEMPLATE_ID:-}
      MSG91_SENDER_ID: ${MSG91_SENDER_ID:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      MICROSOFT_REDIRECT_URI: ${MICROSOFT_REDIRECT_URI:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
    name: vidyouth-pgdata
