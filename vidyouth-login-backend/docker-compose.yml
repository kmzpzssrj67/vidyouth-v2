# Local-dev compose. Brings up Postgres + Redis + the API on one network so a
# fresh clone can run `docker compose up` and hit http://localhost:8080/healthz.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vidyouth_lms
      POSTGRES_USER: vidyouth
      POSTGRES_PASSWORD: devpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vidyouth -d vidyouth_lms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      PORT: 8080
      LOG_LEVEL: debug
      DATABASE_URL: postgres://vidyouth:devpass@postgres:5432/vidyouth_lms
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: "vidyouth:dev:"
      BCRYPT_PEPPER: dev-pepper-replace-in-prod-32chars
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  pgdata:
