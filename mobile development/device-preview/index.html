<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vidyouth — iPhone 16 Pro Max Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      /* iPhone 16 Pro Max logical viewport: 440 × 956 */
      --screen-w: 440px;
      --screen-h: 956px;
      --bezel-x: 14px;
      --bezel-y: 14px;
      --frame-w: calc(var(--screen-w) + (var(--bezel-x) * 2));
      --frame-h: calc(var(--screen-h) + (var(--bezel-y) * 2));
      --frame-radius: 60px;
      --screen-radius: 48px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background:
        radial-gradient(ellipse 60% 50% at 30% 20%, rgba(232,168,92,0.18), transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 90%, rgba(120,70,30,0.30), transparent 60%),
        linear-gradient(160deg, #0E0703 0%, #1A0E06 50%, #0E0703 100%);
      color: #FAF0E0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
      overflow: hidden;
    }
    body {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }
    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(20, 12, 6, 0.5);
      border-bottom: 1px solid rgba(232, 194, 140, 0.10);
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      font-weight: 700; letter-spacing: -0.3px; font-size: 15px;
    }
    .brand .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: linear-gradient(135deg, #F5C679, #C99A5C);
      box-shadow: 0 0 14px rgba(232, 168, 92, 0.7);
    }
    .brand .sub {
      color: #A88A6E; font-weight: 500; letter-spacing: 0.2px; font-size: 13px;
    }
    .device-label {
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
      color: #D9C4A6;
    }
    .actions { display: flex; gap: 8px; }
    .btn {
      background: rgba(232, 194, 140, 0.12);
      border: 1px solid rgba(232, 194, 140, 0.24);
      color: #FAF0E0; font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 999px; cursor: pointer;
      letter-spacing: 0.2px;
      transition: background 0.2s;
    }
    .btn:hover { background: rgba(232, 194, 140, 0.22); }
    .stage {
      display: grid; place-items: center;
      overflow: auto;
      padding: 24px;
      min-height: 0;
    }
    .phone {
      position: relative;
      width: var(--frame-w);
      height: var(--frame-h);
      background:
        linear-gradient(155deg, #2A2A2C 0%, #0A0A0C 50%, #2A2A2C 100%);
      border-radius: var(--frame-radius);
      padding: var(--bezel-y) var(--bezel-x);
      flex-shrink: 0;
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(255, 255, 255, 0.05) inset,
        0 0 0 8px rgba(0, 0, 0, 0.85) inset,
        0 0 60px rgba(232, 168, 92, 0.12);
    }
    /* Side buttons (cosmetic) */
    .side-btn {
      position: absolute;
      background: #1f1f21;
      border-radius: 2px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .action-btn { left: -3px; top: 130px; width: 4px; height: 36px; }
    .vol-up    { left: -3px; top: 200px; width: 4px; height: 70px; }
    .vol-down  { left: -3px; top: 285px; width: 4px; height: 70px; }
    .power     { right: -3px; top: 230px; width: 4px; height: 110px; }

    .screen {
      width: var(--screen-w);
      height: var(--screen-h);
      border-radius: var(--screen-radius);
      overflow: hidden;
      background: #150A04;
      position: relative;
    }
    iframe {
      width: 100%; height: 100%;
      border: 0; display: block;
      background: #150A04;
    }
    /* Dynamic Island */
    .island {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 124px; height: 35px;
      background: #000;
      border-radius: 999px;
      z-index: 5;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 2px 6px rgba(0,0,0,0.5);
    }
    footer {
      padding: 12px 20px;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      background: rgba(20, 12, 6, 0.5);
      border-top: 1px solid rgba(232, 194, 140, 0.10);
      font-size: 11px;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: #A88A6E;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: #B8E0A0;
      box-shadow: 0 0 10px #B8E0A0;
      animation: pulse 1.6s infinite ease-in-out;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%     { opacity: 0.45; transform: scale(0.85); }
    }

    /* Scale phone if viewport is shorter than the phone */
    @media (max-height: 1020px) {
      .phone { transform: scale(0.92); transform-origin: center; }
    }
    @media (max-height: 940px) {
      .phone { transform: scale(0.82); }
    }
    @media (max-height: 860px) {
      .phone { transform: scale(0.74); }
    }
    @media (max-height: 780px) {
      .phone { transform: scale(0.66); }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <span class="dot"></span>
      <span>Vidyouth</span>
      <span class="sub">— Live Mobile Preview</span>
    </div>
    <div class="device-label">iPhone 16 Pro Max · 440 × 956</div>
    <div class="actions">
      <button class="btn" onclick="reload()">&#8635; Reload</button>
      <button class="btn" onclick="window.open('http://localhost:8081','_blank')">Open in tab</button>
    </div>
  </header>

  <main class="stage">
    <div class="phone" aria-label="iPhone 16 Pro Max device frame">
      <span class="side-btn action-btn"></span>
      <span class="side-btn vol-up"></span>
      <span class="side-btn vol-down"></span>
      <span class="side-btn power"></span>
      <div class="screen">
        <div class="island" aria-hidden="true"></div>
        <iframe
          id="app"
          src="http://localhost:8081"
          title="Vidyouth login preview"
          allow="clipboard-write"
        ></iframe>
      </div>
    </div>
  </main>

  <footer>
    <span class="pulse"></span>
    <span>Hot reload live · save any .tsx file to update the phone</span>
  </footer>

  <script>
    function reload() {
      const f = document.getElementById('app');
      f.src = f.src;
    }
  </script>
</body>
</html>
