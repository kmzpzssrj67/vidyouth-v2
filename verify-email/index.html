<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vidyouth | Verify email</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #150a04;
      --panel: rgba(80, 50, 25, 0.28);
      --border: rgba(232, 194, 140, 0.28);
      --text: #faf0e0;
      --muted: #d9c4a6;
      --accent: #e8c28c;
      --success: #86efac;
      --danger: #fca5a5;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 18% 12%, rgba(232, 194, 140, 0.18), transparent 32%),
        radial-gradient(circle at 82% 82%, rgba(34, 197, 94, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg), #2a170a);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(440px, 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 30px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(22px);
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.15; }
    p { margin: 0; color: var(--muted); line-height: 1.6; }
    .status {
      margin-top: 22px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
    }
    .status.success { color: var(--success); border-color: rgba(134, 239, 172, 0.45); }
    .status.error { color: var(--danger); border-color: rgba(252, 165, 165, 0.45); }
    a, button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      margin-top: 22px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: linear-gradient(135deg, var(--accent), #c99a5c);
      color: #150a04;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <h1>Verify email</h1>
    <p>We are confirming your Vidyouth account email.</p>
    <div id="status" class="status">Checking verification link...</div>
    <a href="/login.html" id="loginLink" hidden>Go to sign in</a>
  </main>

  <script>
    const API_BASE_URL = localStorage.getItem('vidyouth_api_base_url') || 'http://localhost:8080';
    const statusEl = document.getElementById('status');
    const loginLink = document.getElementById('loginLink');
    const token = new URLSearchParams(window.location.search).get('token');

    function setStatus(kind, message) {
      statusEl.className = `status ${kind}`;
      statusEl.textContent = message;
      if (kind === 'success') loginLink.hidden = false;
    }

    async function verifyEmail() {
      if (!token) {
        setStatus('error', 'Verification token is missing. Open the full link from your email.');
        return;
      }

      try {
        const response = await fetch(`${API_BASE_URL}/auth/email-verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token }),
        });
        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          const message = payload.error === 'invalid_or_expired_token'
            ? 'This verification link is invalid or expired. Please request a new email.'
            : 'Could not verify email. Please try again.';
          setStatus('error', message);
          return;
        }

        setStatus('success', 'Email verified successfully. You can now sign in.');
      } catch {
        setStatus('error', 'Backend is not reachable. Make sure the API is running on localhost:8080.');
      }
    }

    verifyEmail();
  </script>
</body>
</html>
