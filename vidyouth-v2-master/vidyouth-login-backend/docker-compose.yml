services:
  postgres:
    image: postgres:16-alpine
    container_name: vidyouth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vidyouth_lms}
      POSTGRES_USER: ${POSTGRES_USER:-vidyouth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpass}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vidyouth} -d ${POSTGRES_DB:-vidyouth_lms}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - vidyouth-backend

  redis:
    image: redis:7-alpine
    container_name: vidyouth-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - vidyouth-backend

  api:
    container_name: vidyouth-api
    restart: unless-stopped
    build:
      context: ./app
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-debug}
      DATABASE_URL: postgres://${POSTGRES_USER:-vidyouth}:${POSTGRES_PASSWORD:-devpass}@postgres:5432/${POSTGRES_DB:-vidyouth_lms}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      PG_POOL_IDLE_MS: ${PG_POOL_IDLE_MS:-10000}
      REDIS_URL: redis://redis:6379
      REDIS_KEY_PREFIX: ${REDIS_KEY_PREFIX:-vidyouth:dev:}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      BCRYPT_PEPPER: ${BCRYPT_PEPPER:-dev-pepper-replace-in-prod-32chars}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ISSUER: ${JWT_ISSUER:-vidyouth.auth}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-vidyouth.lms}
      JWT_ACCESS_TTL_SECONDS: ${JWT_ACCESS_TTL_SECONDS:-900}
      JWT_REFRESH_TTL_SECONDS: ${JWT_REFRESH_TTL_SECONDS:-2592000}
      LOCKOUT_MAX_FAILED: ${LOCKOUT_MAX_FAILED:-5}
      LOCKOUT_WINDOW_SECONDS: ${LOCKOUT_WINDOW_SECONDS:-1800}
      LOCKOUT_DURATION_SECONDS: ${LOCKOUT_DURATION_SECONDS:-1800}
      SESSION_MAX_PER_USER: ${SESSION_MAX_PER_USER:-3}
      OTP_TTL_SECONDS: ${OTP_TTL_SECONDS:-600}
      OTP_LENGTH: ${OTP_LENGTH:-6}
      OTP_RATE_LIMIT_WINDOW_SECONDS: ${OTP_RATE_LIMIT_WINDOW_SECONDS:-600}
      OTP_RATE_LIMIT_MAX: ${OTP_RATE_LIMIT_MAX:-5}
      OTP_VERIFY_MAX_ATTEMPTS: ${OTP_VERIFY_MAX_ATTEMPTS:-5}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      SNS_SENDER_ID: ${SNS_SENDER_ID:-}
      SNS_SMS_TYPE: ${SNS_SMS_TYPE:-Transactional}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@vidyouth.local}
      SES_FROM_EMAIL: ${SES_FROM_EMAIL:-no-reply@vidyouth.local}
      EMAIL_VERIFICATION_TTL_SECONDS: ${EMAIL_VERIFICATION_TTL_SECONDS:-86400}
      PASSWORD_RESET_TTL_SECONDS: ${PASSWORD_RESET_TTL_SECONDS:-3600}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AUDIT_S3_REGION: ${AUDIT_S3_REGION:-ap-south-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ./app/src:/app/src
      - ./app/tsconfig.json:/app/tsconfig.json:ro
    networks:
      - vidyouth-backend

networks:
  vidyouth-backend:
    driver: bridge

volumes:
  pgdata:
    name: vidyouth-pgdata
